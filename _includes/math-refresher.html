<style>
  .math-practice-app {
    width: min(760px, 100%);
    margin: 2rem auto;
    color: #1f2937;
    font-family: Arial, sans-serif;
  }

  /*
   * Force elements with the native hidden attribute
   * to remain hidden until JavaScript reveals them.
   */
  .math-practice-app [hidden] {
    display: none !important;
  }

  .math-practice-app * {
    box-sizing: border-box;
  }

  .math-practice-controls,
  .math-practice-card {
    margin-bottom: 1rem;
    padding: 1.25rem;
    background: white;
    border: 1px solid #d9dee5;
    border-radius: 12px;
  }

  .math-practice-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .math-practice-field {
    flex: 1;
    min-width: 180px;
  }

  .math-practice-app label {
    display: block;
    margin-bottom: 0.375rem;
    font-weight: bold;
  }

  .math-practice-app select,
  .math-practice-app button {
    min-height: 42px;
    padding: 0.625rem 0.875rem;
    border-radius: 8px;
    font-size: 1rem;
  }

  .math-practice-app select {
    width: 100%;
    border: 1px solid #aeb7c2;
    background: white;
    color: #1f2937;
  }

  .math-practice-app button {
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }

  .math-practice-app button:hover:not(:disabled) {
    background: #1d4ed8;
  }

  .math-practice-app button:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }

  .math-practice-app .secondary-button {
    background: #4b5563;
  }

  .math-practice-app .secondary-button:hover:not(:disabled) {
    background: #374151;
  }

  .math-practice-app .answer-button {
    background: #15803d;
  }

  .math-practice-app .answer-button:hover:not(:disabled) {
    background: #166534;
  }

  .math-practice-button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.625rem;
    margin-top: 1.25rem;
  }

  .math-practice-metadata {
    color: #667085;
    font-size: 0.9rem;
    text-transform: capitalize;
  }

  .math-practice-expression {
    margin: 1.5rem 0;
    padding: 1rem;
    overflow-x: auto;
    background: #f8fafc;
    border-left: 4px solid #2563eb;
    font-size: 1.15rem;
  }

  .math-practice-panel {
    margin-top: 1.125rem;
    padding: 1rem;
    border-radius: 8px;
  }

  .math-practice-hint {
    background: #fff7d6;
    border: 1px solid #f0d56d;
  }

  .math-practice-answer {
    background: #e9f8ee;
    border: 1px solid #8bd0a2;
  }

  .math-practice-answer ol {
    line-height: 1.7;
  }

  .math-practice-error {
    color: #b42318;
    font-weight: bold;
  }
</style>

<div class="math-practice-app">
  <section class="math-practice-controls">
    <div class="math-practice-field">
      <label for="practice-category">Category</label>

      <select id="practice-category">
        <option value="all">All categories</option>
        <option value="differentiation">Differentiation</option>
        <option value="integration">Integration</option>
        <option value="linear-algebra">Linear algebra</option>
        <option value="probability">Probability</option>
        <option value="statistics">Statistics</option>
      </select>
    </div>

    <div class="math-practice-field">
      <label for="practice-difficulty">Difficulty</label>

      <select id="practice-difficulty">
        <option value="all">All difficulties</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <button
      id="practice-new-question-button"
      type="button"
      disabled
    >
      Show Question
    </button>
  </section>

  <!-- Hidden until Show Question is clicked. -->
  <section
    id="practice-question-card"
    class="math-practice-card"
    hidden
  >
    <p
      id="practice-metadata"
      class="math-practice-metadata"
    ></p>

    <h2 id="practice-question-text"></h2>

    <div
      id="practice-expression"
      class="math-practice-expression"
    ></div>

    <div class="math-practice-button-row">
      <button
        id="practice-hint-button"
        class="secondary-button"
        type="button"
      >
        Show Hint
      </button>

      <button
        id="practice-answer-button"
        class="answer-button"
        type="button"
      >
        Reveal Answer
      </button>
    </div>

    <!-- Hidden until Show Hint is clicked. -->
    <div
      id="practice-hint-panel"
      class="math-practice-panel math-practice-hint"
      hidden
    >
      <h3>Hint</h3>
      <p id="practice-hint-text"></p>
    </div>

    <!-- Hidden until Reveal Answer is clicked. -->
    <div
      id="practice-answer-panel"
      class="math-practice-panel math-practice-answer"
      hidden
    >
      <h3>Answer</h3>
      <div id="practice-answer-text"></div>

      <h3>Solution</h3>
      <ol id="practice-solution-steps"></ol>
    </div>
  </section>

  <p id="practice-status-message"></p>
</div>

<script>
  (() => {
    const JSON_FILE =
      "{{ '/assets/math-practice/problem_set.json' | relative_url }}";

    let allQuestions = [];
    let currentQuestion = null;
    let previousQuestionId = null;
    let visibleHintIndex = 0;

    const categorySelect =
      document.getElementById("practice-category");

    const difficultySelect =
      document.getElementById("practice-difficulty");

    const newQuestionButton =
      document.getElementById(
        "practice-new-question-button"
      );

    const hintButton =
      document.getElementById("practice-hint-button");

    const answerButton =
      document.getElementById("practice-answer-button");

    const questionCard =
      document.getElementById("practice-question-card");

    const metadata =
      document.getElementById("practice-metadata");

    const questionText =
      document.getElementById("practice-question-text");

    const expression =
      document.getElementById("practice-expression");

    const hintPanel =
      document.getElementById("practice-hint-panel");

    const hintText =
      document.getElementById("practice-hint-text");

    const answerPanel =
      document.getElementById("practice-answer-panel");

    const answerText =
      document.getElementById("practice-answer-text");

    const solutionSteps =
      document.getElementById(
        "practice-solution-steps"
      );

    const statusMessage =
      document.getElementById(
        "practice-status-message"
      );

    async function loadQuestions() {
      try {
        setStatus("Loading questions...");

        const response = await fetch(JSON_FILE);

        if (!response.ok) {
          throw new Error(
            `Could not load the JSON file. ` +
            `HTTP status: ${response.status}`
          );
        }

        const data = await response.json();

        if (!Array.isArray(data.questions)) {
          throw new Error(
            "The JSON file does not contain a questions array."
          );
        }

        allQuestions = data.questions;

        newQuestionButton.disabled = false;

        setStatus(
          `${allQuestions.length} questions loaded.`
        );
      } catch (error) {
        console.error(
          "Question loading error:",
          error
        );

        setStatus(
          "Unable to load the question file. " +
          "Check the JSON path and browser console.",
          true
        );
      }
    }

    function getEligibleQuestions() {
      const selectedCategory =
        categorySelect.value;

      const selectedDifficulty =
        difficultySelect.value;

      return allQuestions.filter((question) => {
        const matchesCategory =
          selectedCategory === "all" ||
          question.category === selectedCategory;

        const matchesDifficulty =
          selectedDifficulty === "all" ||
          question.difficulty === selectedDifficulty;

        return matchesCategory && matchesDifficulty;
      });
    }

    function chooseRandomQuestion() {
      let eligibleQuestions =
        getEligibleQuestions();

      if (eligibleQuestions.length === 0) {
        setStatus(
          "No questions match the selected filters.",
          true
        );

        return;
      }

      /*
       * Avoid repeating the immediately previous
       * question when multiple choices are available.
       */
      if (
        eligibleQuestions.length > 1 &&
        previousQuestionId !== null
      ) {
        eligibleQuestions =
          eligibleQuestions.filter(
            (question) =>
              question.id !== previousQuestionId
          );
      }

      const randomIndex = Math.floor(
        Math.random() * eligibleQuestions.length
      );

      currentQuestion =
        eligibleQuestions[randomIndex];

      previousQuestionId =
        currentQuestion.id;

      displayQuestion(currentQuestion);
    }

    function displayQuestion(question) {
      visibleHintIndex = 0;

      metadata.textContent =
        `${formatText(question.category)} · ` +
        `${formatText(question.topic)} · ` +
        `${formatText(question.difficulty)}`;

      questionText.textContent =
        question.question || "";

      expression.textContent =
        `\\[${question.expression || ""}\\]`;

      /*
       * Always reset the hint and answer when a new
       * question is shown.
       */
      hintPanel.hidden = true;
      answerPanel.hidden = true;

      hintText.textContent = "";
      
      setAnswerContent(question.answer);

      visibleHintIndex = 0;

      const hasHints =
        Array.isArray(question.hints) &&
        question.hints.length > 0;

      hintButton.disabled = !hasHints;
      hintButton.textContent =
        hasHints ? "Show Hint" : "No Hint Available";

      answerButton.disabled = false;
      answerButton.textContent = "Reveal Answer";

      solutionSteps.replaceChildren();

      const steps = Array.isArray(
        question.solutionSteps
      )
        ? question.solutionSteps
        : [];

      steps.forEach((step) => {
        const listItem =
          document.createElement("li");

        listItem.textContent = step;
        solutionSteps.appendChild(listItem);
      });

      /*
       * Reveal only the question card.
       * The hint and answer remain hidden.
       */
      questionCard.hidden = false;

      setStatus("");

      requestAnimationFrame(() => {
        renderMath(questionCard);
      });
    }

    function showNextHint() {
      if (
        !currentQuestion ||
        !Array.isArray(currentQuestion.hints) ||
        currentQuestion.hints.length === 0
      ) {
        return;
      }

      hintText.textContent =
        currentQuestion.hints[visibleHintIndex];

      hintPanel.hidden = false;

      visibleHintIndex += 1;

      if (
        visibleHintIndex >=
        currentQuestion.hints.length
      ) {
        hintButton.disabled = true;
        hintButton.textContent = "No More Hints";
      } else {
        hintButton.textContent =
          "Show Another Hint";
      }

      renderMath(hintPanel);
    }

    function revealAnswer() {
      if (!currentQuestion) {
        return;
      }

      answerPanel.hidden = false;

      answerButton.disabled = true;
      answerButton.textContent = "Answer Revealed";

      renderMath(answerPanel);
    }

    function formatText(value) {
      if (typeof value !== "string") {
        return "";
      }

      return value
        .split("-")
        .map((word) => {
          return (
            word.charAt(0).toUpperCase() +
            word.slice(1)
          );
        })
        .join(" ");
    }

    function setStatus(message, isError = false) {
      statusMessage.textContent = message;

      statusMessage.classList.toggle(
        "math-practice-error",
        isError
      );
    }

 function renderMath(element) {
  if (!element || !window.MathJax) {
    return;
  }

  try {
    if (typeof MathJax.typesetPromise === "function") {
      MathJax.typesetPromise([element]).catch((error) => {
        console.error("MathJax typesetting error:", error);
      });

      return;
    }

    if (
      MathJax.Hub &&
      typeof MathJax.Hub.Queue === "function"
    ) {
      MathJax.Hub.Queue([
        "Typeset",
        MathJax.Hub,
        element
      ]);
    }
  } catch (error) {
    console.error("MathJax error:", error);
  }
}

function unwrapPlainTextAnswer(value) {
  const answerValue = String(value || "").trim();

  if (
    answerValue.startsWith("\\text{") &&
    answerValue.endsWith("}")
  ) {
    return answerValue.slice(6, -1);
  }

  return null;
}

function setAnswerContent(value) {
  const answerValue = String(value || "").trim();
  const plainText = unwrapPlainTextAnswer(answerValue);

  answerText.classList.remove(
    "plain-answer",
    "math-answer"
  );

  if (plainText !== null) {
    answerText.textContent = plainText;
    answerText.classList.add("plain-answer");
  } else {
    answerText.textContent = `\\[${answerValue}\\]`;
    answerText.classList.add("math-answer");
  }
}

    newQuestionButton.addEventListener(
      "click",
      chooseRandomQuestion
    );

    hintButton.addEventListener(
      "click",
      showNextHint
    );

    answerButton.addEventListener(
      "click",
      revealAnswer
    );

    loadQuestions();
  })();
</script>
